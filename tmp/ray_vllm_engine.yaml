# Process config example for dataset

# global parameters
project_name: 'demo-process'
# dataset_path: '/mnt/workspace/dj-test/qa_data.jsonl'  # path to your dataset directory or file
dataset_path: '/mnt/workspace/dj-test/image_caption.jsonl'
np: 4  # number of subprocess to process your dataset

export_path: './outputs/demo-process-vlm3/vllm-processed.jsonl'
skip_op_error: false

executor_type: ray
ray_address: auto
text_keys: 'query'


# process schedule
# a list of several process operators with their arguments
process:
  - alphanumeric_filter:                                    # filter text with alphabet/numeric ratio out of specific range.
      tokenization: false                                     # Whether to count the ratio of alphanumeric to the total number of tokens.
      min_ratio: 0.0                                          # the min ratio of filter range
      max_ratio: 0.9                                          # the max ratio of filter range
  - llm_ray_vllm_engine_pipeline:                           # mapper to generate question and answer pairs from text.
      hf_model: '/ml/data_juicer/models/Qwen/Qwen2.5-7B-Instruct/'           # Model name on huggingface to generate question and answer pairs.
      sampling_params: {}                                     # Sampling parameters for text generation. e.g {'temperature': 0.9, 'top_p': 0.95}
      # gpu_required: 1
      # cpu_required: 1
      system_prompt: 'You are a helpful assistant.'
      batch_size: 10
      num_proc: 1
      response_key: text_response
      query_key: text
  - vlm_ray_vllm_engine_pipeline:                           # mapper to generate question and answer pairs from text.
      hf_model: '/mnt/data/pretrained_models/Qwen/Qwen2.5-VL-3B-Instruct'           # Model name on huggingface to generate question and answer pairs.
      sampling_params: {}                                     # Sampling parameters for text generation. e.g {'temperature': 0.9, 'top_p': 0.95}
      # gpu_required: 1
      # cpu_required: 1
      batch_size: 1
      num_proc: 1
  - average_line_length_filter:                             # filter text with the average length of lines out of specific range.
      min_len: 1                                             # the min length of filter range
      max_len: 10000  
